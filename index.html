<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>あなたにピッタリの証券口座診断</title>
    <meta name="description" content="約1分で完了。あなたに最適な証券口座を無料で診断します。">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- 背景画像コンテナ -->
        <div class="bg-image"></div>
        <div class="bg-overlay"></div>

        <main class="container">
            <!-- ランディングページ -->
            <section id="landing" class="page active">
                <div class="hero-content">
                    <h1 class="catchphrase">投資を、<br>難しく考えなくていい。</h1>
                    <p class="sub-catchphrase">あなたにピッタリの証券口座診断</p>
                    
                    <div class="badges">
                        <span class="badge">約1分で完了</span>
                        <span class="badge">5問の簡単な質問</span>
                        <span class="badge">個人情報不要</span>
                    </div>

                    <button id="start-btn" class="btn btn-primary btn-large">
                        無料で診断する <span class="arrow">→</span>
                    </button>
                </div>
            </section>

            <!-- 質問ページ -->
            <section id="question" class="page hidden">
                <div class="question-container glass-card">
                    <div class="progress-header">
                        <span class="progress-text">質問 <span id="current-q">1</span>/<span id="total-q">5</span></span>
                        <span id="progress-percent" class="progress-percent">20%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div id="progress-bar" class="progress-bar-fill"></div>
                    </div>

                    <p id="back-btn" class="back-link hidden">← 前の質問に戻る</p>

                    <div class="question-content">
                        <div class="q-number-circle"><span id="q-circle-num">1</span></div>
                        <h2 id="question-text" class="question-text">質問文がここに入ります</h2>
                        
                        <div id="options-container" class="options-grid">
                            <!-- 選択肢ボタンがJavascriptで生成されます -->
                        </div>
                    </div>
                </div>
            </section>

            <!-- ローディング画面 -->
            <section id="loading" class="page hidden">
                <div class="loading-container glass-card">
                    <div class="spinner"></div>
                    <h2>診断結果を分析中...</h2>
                    <p>あなたに最適な証券口座を探しています</p>
                </div>
            </section>

            <!-- 結果ページ -->
            <section id="result" class="page hidden">
                <div class="result-header">
                    <h2>あなたにピッタリの<br><span class="highlight-text">証券口座タイプ</span></h2>
                    <p>あなたの回答を分析した結果、以下の証券口座がおすすめです</p>
                </div>
                
                <!-- 結果コンテンツ全体を囲むGlassmorphismカード -->
                <div class="result-container glass-card mb-4">
                    <!-- トップマッチヘッダー -->
                    <div class="top-match-header">
                        <div class="match-bar-wrap">
                            <div class="match-bar-bg">
                                <div id="top-match-bar" class="match-bar-fill"></div>
                            </div>
                            <span id="top-match-percent" class="match-percent-text">おすすめ度 95%</span>
                        </div>
                        <h3 id="result-type-title" class="result-type-title">タイプタイトル</h3>
                        <p id="result-type-badge" class="result-type-sub">TYPE CATEGORY</p>
                        <div class="result-description-box">
                            <p id="result-description">全体の説明文が入ります。</p>
                        </div>
                        <p class="suggestion-text">あなたにおすすめのサービス</p>
                    </div>

                    <!-- おすすめランキング (Top 3) -->
                    <div id="ranking-container" class="ranking-list">
                        <!-- Javascriptで生成 -->
                    </div>
                </div>
                
                <div class="retry-action">
                    <button id="retry-btn" class="btn btn-secondary">もう一度診断する</button>
                </div>
            </section>
        </main>
    </div>

    <!-- モジュールのインポート -->
    <script type="module" src="src/script.js"></script>
</body>
</html>
